# Apply this AFTER replacing the placeholders. DO NOT commit real secrets.
# Use Sealed Secrets / Vault / External Secrets Operator in production.
apiVersion: v1
kind: Secret
metadata:
  name: infographic-api-secrets
  namespace: orion
type: Opaque
stringData:
  # Example: redis://:password@redis.orion.svc.cluster.local:6379/0
  redis-url: "redis://redis.orion.svc.cluster.local:6379/0"

  # Browserless WS endpoint with token. Adjust hostname/port to your in-cluster
  # browserless service. Token MUST match what the browserless deployment sets.
  #
  # Format: ws://<service>:<port>/chromium/playwright?token=<TOKEN>
  # Production browserless typically uses TLS — switch to wss:// if your cluster
  # has it terminated, e.g.:
  #   wss://browserless.orion.svc.cluster.local/chromium/playwright?token=...
  browser-ws-endpoint: "ws://browserless.orion.svc.cluster.local:3000/chromium/playwright?token=REPLACE_ME"
